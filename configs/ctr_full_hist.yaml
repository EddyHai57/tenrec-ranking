input_path: data/Tenrec/ctr_data_1M.csv
output_root: outputs/preprocessed

label_column: click
group_column: user_id

features:
  categorical:
    - user_id
    - item_id
    - video_category
    - gender
    - age

sequence_features:
  hist_item:
    columns:
      - hist_1
      - hist_2
      - hist_3
      - hist_4
      - hist_5
      - hist_6
      - hist_7
      - hist_8
      - hist_9
      - hist_10
    vocab_source: item_id
    padding_index: 1
    oov_index: 0

missing_values:
  user_id:
    - ""
    - "\\N"
  item_id:
    - ""
    - "\\N"
  video_category:
    - ""
    - "\\N"
  gender:
    - ""
    - "\\N"
  age:
    - ""
    - "\\N"
  hist_item:
    - ""
    - "0"
    - "\\N"

split:
  train_ratio: 0.8
  valid_ratio: 0.1
  test_ratio: 0.1
  deterministic_user_order: true
  shuffle: false
  deduplicate: false
  seed_used_by_split: false

full:
  source: data/Tenrec/ctr_data_1M.csv
  note: "Full local preprocessing with hist sequence features for DIN; outputs are ignored and must not enter git."
